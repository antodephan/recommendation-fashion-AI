# ============================================================
# AI Fashion Recommendation System — Service composition
# ============================================================

x-backend-env: &backend-env
  ENVIRONMENT: ${ENVIRONMENT:-development}
  LOG_LEVEL: ${LOG_LEVEL:-INFO}
  DATABASE_URL: ${DATABASE_URL}
  REDIS_URL: ${REDIS_URL}
  QDRANT_HOST: ${QDRANT_HOST}
  QDRANT_PORT: ${QDRANT_PORT}
  QDRANT_API_KEY: ${QDRANT_API_KEY}
  JWT_SECRET: ${JWT_SECRET}
  JWT_ALGORITHM: ${JWT_ALGORITHM}
  ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES}
  REFRESH_TOKEN_EXPIRE_DAYS: ${REFRESH_TOKEN_EXPIRE_DAYS}
  OPENAI_API_KEY: ${OPENAI_API_KEY}
  OPENAI_CHAT_MODEL: ${OPENAI_CHAT_MODEL}
  OPENAI_EMBEDDING_MODEL: ${OPENAI_EMBEDDING_MODEL}
  OPENAI_VISION_MODEL: ${OPENAI_VISION_MODEL}
  GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
  GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
  GOOGLE_REDIRECT_URI: ${GOOGLE_REDIRECT_URI}
  FACEBOOK_CLIENT_ID: ${FACEBOOK_CLIENT_ID}
  FACEBOOK_CLIENT_SECRET: ${FACEBOOK_CLIENT_SECRET}
  FACEBOOK_REDIRECT_URI: ${FACEBOOK_REDIRECT_URI}
  SMTP_HOST: ${SMTP_HOST}
  SMTP_PORT: ${SMTP_PORT}
  SMTP_USERNAME: ${SMTP_USERNAME}
  SMTP_PASSWORD: ${SMTP_PASSWORD}
  SMTP_FROM_EMAIL: ${SMTP_FROM_EMAIL}
  SMTP_FROM_NAME: ${SMTP_FROM_NAME}
  OPENWEATHER_API_KEY: ${OPENWEATHER_API_KEY}
  SENTRY_DSN: ${SENTRY_DSN}
  BACKEND_CORS_ORIGINS: ${BACKEND_CORS_ORIGINS}
  FASHION_LEGACY_DIR: ${FASHION_LEGACY_DIR:-/app/legacy}
  FASHION_CSV_PATH: ${FASHION_CSV_PATH:-/app/legacy/data/styles.csv}
  FASHION_IMAGES_DIR: ${FASHION_IMAGES_DIR:-/app/legacy/data/images}
  CATALOG_IMPORT_LIMIT: ${CATALOG_IMPORT_LIMIT:-3000}
  CATALOG_AUTO_IMPORT: ${CATALOG_AUTO_IMPORT:-false}
  RAPIDAPI_KEY: ${RAPIDAPI_KEY:-}
  RAPIDAPI_HM_HOST: ${RAPIDAPI_HM_HOST:-apidojo-hm-hennes-mauritz-v1.p.rapidapi.com}
  HM_REGION: ${HM_REGION:-vn}
  HM_CATALOG_IMPORT_LIMIT: ${HM_CATALOG_IMPORT_LIMIT:-2000}
  HM_CATALOG_AUTO_IMPORT: ${HM_CATALOG_AUTO_IMPORT:-true}
  HM_TRENDS_SYNC_INTERVAL_HOURS: ${HM_TRENDS_SYNC_INTERVAL_HOURS:-72}
  HM_SCHEDULER_ENABLED: ${HM_SCHEDULER_ENABLED:-true}
  SUPERADMIN_EMAIL: ${SUPERADMIN_EMAIL}
  SUPERADMIN_PASSWORD: ${SUPERADMIN_PASSWORD}

services:
  postgres:
    image: postgres:16-alpine
    container_name: fashion-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [fashion-net]
    ports: ["5432:5432"]

  redis:
    image: redis:7-alpine
    container_name: fashion-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks: [fashion-net]
    ports: ["6379:6379"]

  qdrant:
    image: qdrant/qdrant:v1.12.5
    container_name: fashion-qdrant
    restart: unless-stopped
    volumes:
      - qdrant_data:/qdrant/storage
    # Local dev: no API key. For production set QDRANT_API_KEY in .env and enable
    # QDRANT__SERVICE__API_KEY on the Qdrant container.
    networks: [fashion-net]
    ports:
      - "6333:6333"
      - "6334:6334"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: fashion-backend
    restart: unless-stopped
    env_file: .env
    environment:
      <<: *backend-env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_started
    volumes:
      - ./backend:/app
      - uploads_data:/app/uploads
      - ./Fashion-Recomendation-AI-ChatBot:/app/legacy:ro
    networks: [fashion-net]
    ports: ["8000:8000"]
    command: >
      sh -c "alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 2 --proxy-headers"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: fashion-frontend
    restart: unless-stopped
    env_file: .env
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
      NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL}
      NEXT_PUBLIC_APP_NAME: ${NEXT_PUBLIC_APP_NAME}
      WATCHPACK_POLLING: "true"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    networks: [fashion-net]
    ports: ["3000:3000"]

  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    container_name: fashion-nginx
    restart: unless-stopped
    depends_on:
      - frontend
      - backend
    networks: [fashion-net]
    ports:
      - "80:80"
      - "443:443"

networks:
  fashion-net:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  qdrant_data:
  uploads_data:
  frontend_node_modules:
